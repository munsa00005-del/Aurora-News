# Paced Gemini summarization for BRIEFXIFY.
# Runs the batch summarizer directly on the GitHub runner against the Neon DB.
# Steady pacing stays under stricter free-model rate limits; each
# run clears a bounded chunk so automatic summarization keeps moving reliably.
name: news-summarize

on:
  schedule:
    - cron: "20 */6 * * *"   # every 6h, offset 20 min after the sync job
  workflow_dispatch: {}

concurrency:
  group: summarize
  cancel-in-progress: false

jobs:
  summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 350        # under GitHub's 6h hard cap
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Summarize pending articles
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GEMINI_BETWEEN_CALLS_MS: "15000"
          SUMMARIZE_MAX: "120"
        run: node scripts/gemini-summarize-all.mjs
