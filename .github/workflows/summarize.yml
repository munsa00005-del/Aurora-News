# Paced Groq summarization for BRIEFXIFY.
# Runs the batch summarizer directly on the GitHub runner against the Neon DB.
# Steady 1-request-per-30s pacing stays under Groq's free-tier limits; a 6h job
# can clear ~650 articles per run, so the backlog stays cleared.
name: news-summarize

on:
  schedule:
    - cron: "20 */6 * * *"   # every 6h, offset 20 min after the sync job
  workflow_dispatch: {}

concurrency:
  group: summarize
  cancel-in-progress: false

jobs:
  summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 350        # under GitHub's 6h hard cap
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Summarize (paced 30s/req)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
          GROQ_BETWEEN_CALLS_MS: "30000"
          SUMMARIZE_MAX: "650"
        run: node scripts/grok-summarize-all.mjs
